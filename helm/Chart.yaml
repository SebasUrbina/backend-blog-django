apiVersion: v2
name: django-blog
description: A Helm chart for the Django + Ninja blog backend application
type: application

# This is the chart version. This version number should be incremented each time you make changes to the chart.
version: 0.1.0

# This is the version number of the application being deployed. This version number should be incremented each time you update the container image.
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: 15.5.4
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
