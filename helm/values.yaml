# Default values for django-blog.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 2

image:
  repository: django-blog
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 999

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: blog-api.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: blog-api-tls
  #    hosts:
  #      - blog-api.local

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes and volumeMounts on the output Deployment definition.
volumes: []
# - name: foo
#   emptyDir: {}

volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Django specific configuration
django:
  debug: "false"
  secretKey: "django-insecure-change-me-in-production-environments-use-secret"
  allowedHosts: "*"
  timeZone: "America/Santiago"
  # Set this to true to run db migrations before deploying/upgrading
  runMigrations: true
  # Set this to true if you want to run the database seed (management/commands/seed.py)
  # warning: seeding is usually only for development/demo environments.
  seedData: true

# PostgreSQL configuration
# If postgresql.enabled is true, the Bitnami PostgreSQL chart is deployed as a sub-chart.
# Otherwise, connection details in externalDatabase are used.
postgresql:
  enabled: true
  auth:
    username: postgres
    password: changeme
    database: backend_devops_interview
  primary:
    persistence:
      enabled: false  # Change to true for persistent storage in production
      size: 8Gi

externalDatabase:
  host: ""
  port: 5432
  username: "postgres"
  password: "postgres"
  database: "backend_devops_interview"
